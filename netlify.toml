[build]
  base      = "."
  command   = "pnpm install && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/exampro run build && pnpm --filter @workspace/api-server run build:netlify"
  publish   = "artifacts/exampro/dist/public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_ENV  = "production"
  PORT      = "3000"
  BASE_PATH = "/"
